name: Release Check

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  cross-compile:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [darwin, linux, windows]
        goarch: [amd64, arm64]
    env:
      CGO_ENABLED: "0"
      GOOS: ${{ matrix.goos }}
      GOARCH: ${{ matrix.goarch }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: cachix/install-nix-action@v30

      - run: nix develop -c go build -trimpath ./cmd/gbash
      - run: nix develop -c go build -trimpath ./contrib/extras/cmd/gbash-extras

  gbash-wasm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: cachix/install-nix-action@v30

      - name: Install workspace dependencies
        run: nix develop -c pnpm install --frozen-lockfile

      - name: Build @ewhauser/gbash-wasm
        run: nix develop -c pnpm --filter @ewhauser/gbash-wasm build

      - name: Test @ewhauser/gbash-wasm
        run: nix develop -c pnpm --filter @ewhauser/gbash-wasm test

  website-export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: cachix/install-nix-action@v30

      - name: Install workspace dependencies
        run: nix develop -c pnpm install --frozen-lockfile

      - name: Build website export
        env:
          GBASH_WEBSITE_BASE_PATH: /gbash
          NEXT_PUBLIC_SITE_URL: https://ewhauser.github.io/gbash
        run: ./scripts/export_website_pages.sh "$PWD" "${RUNNER_TEMP}/github-pages"

      - name: Validate website export
        env:
          EXPORT_ROOT: ${{ runner.temp }}/github-pages
        run: |
          set -euo pipefail
          test -f "$EXPORT_ROOT/docs/performance/compatibility/index.html"
          test ! -e "$EXPORT_ROOT/compat/latest/index.html"
