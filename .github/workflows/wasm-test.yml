name: WASM Tests

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: cachix/install-nix-action@v30

      - name: Install workspace dependencies
        run: nix develop -c pnpm install --frozen-lockfile

      - name: Build @ewhauser/gbash-wasm
        run: nix develop -c pnpm --filter @ewhauser/gbash-wasm build

      - name: Test @ewhauser/gbash-wasm
        run: nix develop -c pnpm --filter @ewhauser/gbash-wasm test
